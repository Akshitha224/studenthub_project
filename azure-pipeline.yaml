trigger:
- main

variables:
  imageName: "studenthub"
  acrName: "studenthubreg"
  acrServiceConnection: "acr-student-connection"
  aksServiceConnection: "aks-service-connection"
  aksCluster: "aks-student-prod"
  resourceGroup: "studenthub-python"

pool:
  vmImage: ubuntu-latest

stages:

- stage: Build
  displayName: Build and Push
  jobs:
  - job: BuildPush
    steps:
    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        containerRegistry: $(acrServiceConnection)
        repository: $(imageName)
        command: buildAndPush
        Dockerfile: '**/Dockerfile'
        tags: |
          $(Build.BuildId)

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - job: Deploy
    steps:
    - task: KubernetesManifest@1
      displayName: Deploy App
      inputs:
        action: deploy
        kubernetesServiceConnection: $(aksServiceConnection)
        manifests: |
          k8s/deployment.yaml
          k8s/service.yaml
        containers: |
          $(acrName).azurecr.io/$(imageName):$(Build.BuildId)
